<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Go On A Date With Me?</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #fff5f7;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.container {
    text-align: center;
}

h1 {
    font-size: 42px;
    color: #ff4d6d;
}

p {
    font-size: 20px;
}

button {
    padding: 15px 35px;
    font-size: 20px;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    margin: 20px;
}

#yes {
    background: #4CAF50;
    color: white;
    transition: 0.2s;
}

#no {
    background: #ff4d6d;
    color: white;
    position: absolute;
}

#message {
    display: none;
    font-size: 30px;
    color: #ff4d6d;
    line-height: 1.5;
}

.cat {
    width: 150px;
    margin-top: 20px;
}

/* Flower burst animation */
.flower {
    position: fixed;
    font-size: 35px;
    pointer-events: none;
    animation: pop 1.5s ease-out forwards;
}

@keyframes pop {
    0% {
        transform: translate(0,0) scale(0);
        opacity: 1;
    }

    100% {
        transform: translate(var(--x), var(--y)) scale(1.5) rotate(360deg);
        opacity: 0;
    }
}

</style>
</head>

<body>

<div class="container">

<h1>Will you go on a date with me? 😊</h1>

<p>Choose wisely...</p>

<button id="yes">Yes 😛</button>
<button id="no">No 😢</button>


<h2 id="message">
YAY!! 🎉<br>
Thank youuuu b 😛<br><br>
Haha get it, because now I can help you in the future 😳
<br><br>

<img class="cat" src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif" alt="cute cat">

</h2>


</div>


<script>

const no = document.getElementById("no");
const yes = document.getElementById("yes");
const message = document.getElementById("message");

let yesSize = 20;


// No button runs away
function moveNoButton() {

    let x = Math.random() * (window.innerWidth - 120);
    let y = Math.random() * (window.innerHeight - 60);

    no.style.left = x + "px";
    no.style.top = y + "px";

    yesSize += 5;
    yes.style.fontSize = yesSize + "px";
}


no.addEventListener("mouseover", moveNoButton);

no.addEventListener("touchstart", function(e){
    e.preventDefault();
    moveNoButton();
});


// Flower explosion
function flowerBurst() {

    const flowers = ["🌸","🌷","🌹","🌺","🌼"];

    for(let i = 0; i < 50; i++) {

        let flower = document.createElement("div");

        flower.className = "flower";
        flower.innerHTML = flowers[Math.floor(Math.random()*flowers.length)];

        flower.style.left = "50%";
        flower.style.top = "50%";

        flower.style.setProperty(
            "--x",
            (Math.random()*600 - 300) + "px"
        );

        flower.style.setProperty(
            "--y",
            (Math.random()*600 - 300) + "px"
        );

        document.body.appendChild(flower);

        setTimeout(() => {
            flower.remove();
        }, 1500);

    }

}


// Yes button clicked
yes.addEventListener("click", function(){

    document.querySelector("h1").style.display = "none";
    document.querySelector("p").style.display = "none";

    yes.style.display = "none";
    no.style.display = "none";

    message.style.display = "block";

    flowerBurst();

});

</script>

</body>
</html>
