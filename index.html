<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Go On A Date With Me?</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #fff5f7;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.container {
    text-align: center;
}

h1 {
    font-size: 42px;
    color: #ff4d6d;
    margin-bottom: 10px;
}

p {
    font-size: 20px;
    color: #555;
}

button {
    padding: 15px 35px;
    font-size: 20px;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    margin: 20px;
    transition: all .2s ease;
}

#yes {
    background: #4CAF50;
    color: white;
}

#no {
    background: #ff4d6d;
    color: white;
    position: absolute;
}

#message {
    display: none;
    font-size: 30px;
    color: #ff4d6d;
    line-height: 1.5;
}

.flower {
    position: fixed;
    top: -50px;
    pointer-events: none;
    user-select: none;
    animation: fall linear forwards;
}

@keyframes fall {
    0% {
        transform: translateY(-50px) rotate(0deg);
        opacity: 1;
    }
    100% {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
    }
}
</style>

</head>

<body>

<div class="container">

<h1>Will you go on a date with me? 😊</h1>

<p>Choose wisely...</p>

<button id="yes">Yes 😛</button>
<button id="no">No 😢</button>

<h2 id="message">
YAY!! 🎉<br>
I knew you'd say yes 😛<br><br>
Haha get it, because now I can help you in the future 😳
</h2>

</div>

<script>

const no = document.getElementById("no");
const yes = document.getElementById("yes");
const message = document.getElementById("message");

let yesSize = 20;

// Move the No button
function moveNoButton() {

    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);

    no.style.left = x + "px";
    no.style.top = y + "px";

    yesSize += 5;
    yes.style.fontSize = yesSize + "px";
}

no.addEventListener("mouseover", moveNoButton);
no.addEventListener("touchstart", function(e){
    e.preventDefault();
    moveNoButton();
});

// Flower animation
function flowerRain() {

    const flowers = ["🌸","🌷","🌹","🌺","🌼","💐"];

    for(let i = 0; i < 80; i++){

        const flower = document.createElement("div");

        flower.className = "flower";
        flower.innerHTML = flowers[Math.floor(Math.random()*flowers.length)];

        flower.style.left = Math.random() * 100 + "vw";
        flower.style.fontSize = (20 + Math.random()*25) + "px";
        flower.style.animationDuration = (3 + Math.random()*3) + "s";
        flower.style.animationDelay = (Math.random()*2) + "s";

        document.body.appendChild(flower);

        setTimeout(() => {
            flower.remove();
        }, 6000);

    }

}

// Yes button
yes.addEventListener("click", function(){

    document.querySelector("h1").style.display = "none";
    document.querySelector("p").style.display = "none";
    yes.style.display = "none";
    no.style.display = "none";

    message.style.display = "block";

    flowerRain();

});

</script>

</body>
</html>
